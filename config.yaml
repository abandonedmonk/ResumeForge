# ResumeForge configuration.
# For personal/private values (your name, GitHub, Google Drive path), create a
# gitignored `config.local.yaml` next to this file — its keys override these.

# === LLM routing ===
# model_tier picks which chain to use:
#   free    -> free_chain (no paid key needed; cascades + rotates keys to dodge rate limits)
#   premium -> premium_chain (bring-your-own GPT / Claude / paid Gemini keys)
#   custom  -> fallback_chain (your own order)
model_tier: "free"
stage1_model: "groq"            # reasoning/selection stage preferred provider (free/custom tiers)
stage2_model: "groq"            # writing/generation stage preferred provider (free/custom tiers)

free_chain: ["groq", "openrouter", "gemini", "cohere", "copilot"]
premium_chain: ["openai", "anthropic", "gemini", "groq"]
fallback_chain: ["groq", "openrouter", "gemini", "cohere", "copilot"]
# Tip: add GROQ_API_KEY_1, GROQ_API_KEY_2, ... to rotate multiple free keys.

groq_reasoning_model: "llama-3.3-70b-versatile"
groq_fast_model: "llama-3.3-70b-versatile"
groq_fallback_reasoning_model: "meta-llama/llama-4-maverick-17b-128e-instruct"
groq_fallback_fast_model: "meta-llama/llama-4-maverick-17b-128e-instruct"
openrouter_model: "openai/gpt-oss-20b:free"
copilot_model: "gpt-4o"
cohere_model: "command-r"
gemini_model: "gemini-2.5-flash"   # used for semantic ATS scoring when reached
openai_model: "gpt-4o"             # premium tier
anthropic_model: "claude-sonnet-4-6"  # premium tier
anthropic_max_tokens: 4096

# Additional OpenAI-compatible providers (bring-your-own key). Not in any default
# chain — enable one by adding its name to a chain above or naming it as a
# stage/task provider (e.g. stage1_model: "mistral"). Keys: MISTRAL_API_KEY,
# DEEPSEEK_API_KEY, TOGETHER_API_KEY, XAI_API_KEY.
mistral_model: "mistral-large-latest"
deepseek_model: "deepseek-chat"
together_model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
xai_model: "grok-2-latest"
# Local models via Ollama (no key; runs fully offline). Enable by setting
# OLLAMA_BASE_URL in .env (e.g. http://localhost:11434/v1), then point a stage or
# chain at "ollama", e.g. stage1_model: "ollama" and stage2_model: "ollama".
# The model must be pulled first: `ollama pull llama3.1`.
ollama_model: "llama3.1"

# Task-aware routing (auto by default): each pipeline task is sent to the best
# provider that actually has a key. Defaults — analyze_jd→groq · ats_scoring→gemini
# · project_selection→groq · project_generation→groq · tailor→groq · cover_letter→groq
# · report→groq. Override a task by naming a provider; the tier chain stays as fallback.
# task_routing:
#   ats_scoring: gemini
#   project_generation: gemini   # e.g. let Gemini write when bodies are large
#
# Per-model token budgets (effective FREE-tier per-request caps, not raw context).
# The router skips to a bigger-context model before trimming, and caps output so the
# total stays under the limit. Raise these for paid tiers. Empty = built-in defaults.
# model_limits:
#   llama-3.3-70b-versatile: { max_input_tokens: 10000, max_output_tokens: 2048 }
#   gemini-2.5-flash: { max_input_tokens: 120000, max_output_tokens: 4096 }

# === Inputs ===
# Neutral starter style guide (tracked). Copy examples/skills.md.example to your own
# gitignored skills file and point default_skills_md at it via config.local.yaml.
default_skills_md: "examples/skills.md.example"
default_jd_txt: "test_files/jd.txt"
default_projects_md: "inputs/project_profiles"
# GitHub Profile Builder: imported repo profiles land here (gitignored). When this
# directory contains any *.md, it transparently replaces default_projects_md as the
# projects source. Leave the bundled examples for onboarding only.
imported_profiles_dir: "examples/my_profile/project_profiles"
# Profile Builder (Phase 6): structured identity/education/experience/certs live here
# (gitignored). The personal template rendered from them transparently replaces the
# bundled template when present. Uploaded cert files are kept under candidate_assets_dir.
profile_yaml: "examples/my_profile/profile.yaml"
personal_resume_tex: "examples/my_profile/template.tex"
candidate_assets_dir: "examples/my_profile/assets"
# Leave empty to use the bundled template chosen by `resume_template`. Set this
# (e.g. in config.local.yaml) to your own personalized .tex to override.
default_resume_tex: ""

# === Template & one-page layout ===
resume_template: "classic"      # any folder under templates/ (classic, modern, ...)
max_projects: 3                 # content budget (templates may override)
max_skills: 4
max_bullets_per_project: 3
candidate_years_experience: 0   # 10+ auto-allows a second page
allow_two_pages: false          # explicit opt-in for a 2-page resume

# === Output ===
dest_folder: ""                 # optional copy destination (e.g. a cloud-synced folder)
default_output_folder: "outputs"
save_history: true
auto_name_pdf: true
candidate_name: ""              # your full name, used in PDF filenames
candidate_github_url: ""        # default project link when a profile omits one
fallback_name: "Tailored Resume"
preview_folder_name: ".preview"

# === Behavior ===
generate_cover_letter: false    # opt-in: an extra LLM call that drafts a cover letter
open_browser_on_launch: true
log_prompts: true
log_dir: ".log"
keyword_coverage_threshold: 0.70
max_retries_per_section: 2
gradio_port: 7860
enrich_with_web_search: false
ats_semantic_scoring: true

# === ATS scoring weights (must sum to 1.0) ===
ats_score_weights:
  keyword_match: 0.35
  semantic_context: 0.20
  section_quality: 0.15
  keyword_placement: 0.15
  impact_metrics: 0.15

# === Auto-optimization loop (Phase 2) ===
auto_optimize: true
auto_optimize_threshold: 80     # re-tailor while overall ATS score is below this
max_optimize_iterations: 3
