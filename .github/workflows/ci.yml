name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # No LaTeX in CI: pdflatex-dependent tests skip themselves via shutil.which guards,
      # and all LLM/network calls are mocked in the test suite.
      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
